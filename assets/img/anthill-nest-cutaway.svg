<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="anthillTitle anthillDesc">
  <title id="anthillTitle">Anthill cutaway — surface mound and underground nest</title>
  <desc id="anthillDesc">Illustration of soil cross-section: grass line, entrance mound, branching tunnels and rounded chambers below ground, with many small worker ants and a two-metre scale bar.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6cbb8"/><stop offset="45%" stop-color="#b8a690"/><stop offset="100%" stop-color="#8f7d66"/>
    </linearGradient>
    <linearGradient id="chamber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a89078"/><stop offset="100%" stop-color="#7d6a58"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- sky -->
  <rect width="920" height="140" fill="url(#sky)"/>
  <!-- grass -->
  <path fill="#4ade80" d="M0 118 L920 118 L920 140 L0 140 Z"/>
  <path fill="#22c55e" opacity=".85" d="M0 128 Q40 108 80 128 T160 122 T240 130 T320 118 T400 126 T480 120 T560 128 T640 122 T720 130 T800 118 T920 126 L920 140 L0 140 Z"/>
  <!-- soil mass -->
  <rect y="140" width="920" height="420" fill="url(#soil)"/>
  <!-- subtle horizon -->
  <line x1="0" y1="140" x2="920" y2="140" stroke="#64748b" stroke-width="2" opacity=".35"/>
  <!-- surface mound -->
  <ellipse cx="460" cy="132" rx="95" ry="28" fill="#6d5a48" stroke="#5c4a3a" stroke-width="2"/>
  <ellipse cx="460" cy="128" rx="72" ry="18" fill="#8b7355" opacity=".9"/>
  <!-- central shaft from mound -->
  <path fill="none" stroke="#4a3f35" stroke-width="10" stroke-linecap="round" d="M460 150 L460 220"/>
  <!-- branching tunnels -->
  <path fill="none" stroke="#5c4d42" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"
    d="M460 220 Q380 260 320 300 Q280 340 240 380 M460 220 Q540 250 600 290 Q680 320 740 360 M460 220 Q500 280 520 340 Q540 400 500 450 M320 300 Q360 360 400 420 M600 290 Q640 350 620 420 M740 360 Q700 420 640 460"/>
  <!-- chamber ovals -->
  <ellipse cx="240" cy="388" rx="52" ry="38" fill="url(#chamber)" stroke="#4a3a30" stroke-width="2" opacity=".95"/>
  <ellipse cx="400" cy="428" rx="48" ry="34" fill="url(#chamber)" stroke="#4a3a30" stroke-width="2" opacity=".95"/>
  <ellipse cx="620" cy="418" rx="56" ry="40" fill="url(#chamber)" stroke="#4a3a30" stroke-width="2" opacity=".95"/>
  <ellipse cx="500" cy="458" rx="44" ry="32" fill="url(#chamber)" stroke="#4a3a30" stroke-width="2" opacity=".95"/>
  <ellipse cx="340" cy="318" rx="36" ry="26" fill="url(#chamber)" stroke="#4a3a30" stroke-width="1.5" opacity=".9"/>
  <ellipse cx="660" cy="338" rx="40" ry="28" fill="url(#chamber)" stroke="#4a3a30" stroke-width="1.5" opacity=".9"/>
  <ellipse cx="520" cy="348" rx="34" ry="24" fill="url(#chamber)" stroke="#4a3a30" stroke-width="1.5" opacity=".88"/>
  <!-- small worker ants (simple silhouettes) -->
  <g fill="#2d241c" opacity=".88">
    <g transform="translate(430,158)"><ellipse cx="0" cy="0" rx="4" ry="2.2"/><ellipse cx="-5" cy="2" rx="2.5" ry="1.8"/><ellipse cx="5" cy="2" rx="2.5" ry="1.8"/></g>
    <g transform="translate(448,175)"><ellipse cx="0" cy="0" rx="3.5" ry="2"/><ellipse cx="-4" cy="1.5" rx="2" ry="1.5"/><ellipse cx="4" cy="1.5" rx="2" ry="1.5"/></g>
    <g transform="translate(385,248)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(340,292)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(280,352)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(220,398)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(255,410)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(530,238)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(590,278)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(650,312)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(710,352)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(760,378)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(480,268)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(512,322)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(488,392)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(518,438)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(388,402)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(608,398)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(360,338)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
    <g transform="translate(688,398)"><ellipse cx="0" cy="0" rx="3.2" ry="1.8"/><ellipse cx="-3.5" cy="1.5" rx="1.8" ry="1.3"/><ellipse cx="3.5" cy="1.5" rx="1.8" ry="1.3"/></g>
  </g>
  <!-- scale bar -->
  <g transform="translate(60,500)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#1e293b" stroke-width="4" stroke-linecap="square"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#1e293b" stroke-width="3"/>
    <line x1="120" y1="-8" x2="120" y2="8" stroke="#1e293b" stroke-width="3"/>
    <text x="60" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1e293b">H 2 m (illustrative scale)</text>
  </g>
  <text x="780" y="528" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Illustration — Anthill HK</text>
</svg>
